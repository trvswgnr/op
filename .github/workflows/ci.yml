name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install scripts dependencies
        run: npm ci --prefix scripts

      - name: Install benchmarks dependencies
        run: npm ci --prefix benchmarks

      - name: Run project quality gate
        run: npm run check
